<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lithosphere Faucet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      color: #888;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .card {
      background: #16161e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #aaa;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #6366f1;
    }
    input[type="text"]::placeholder {
      color: #555;
    }
    button {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .result.success {
      display: block;
      background: #0d2818;
      border: 1px solid #1a5c2e;
      color: #4ade80;
    }
    .result.error {
      display: block;
      background: #2d1216;
      border: 1px solid #5c1a22;
      color: #f87171;
    }
    .result .tx-hash {
      word-break: break-all;
      margin-top: 0.5rem;
      color: #93c5fd;
    }
    .info {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
    }
    .info span { color: #8b5cf6; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Lithosphere Faucet</h1>
      <p>Get test LITHO tokens for the Makalu testnet</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="address">Wallet Address</label>
        <input
          type="text"
          id="address"
          placeholder="0x..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button id="drip-btn" onclick="requestDrip()">
        Request Test Tokens
      </button>

      <div id="result" class="result"></div>

      <div class="info">
        <p>Drip amount: <span id="drip-amount">1 LITHO</span></p>
        <p>Cooldown: <span id="cooldown">24 hours</span> per address</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    async function requestDrip() {
      const addressInput = document.getElementById('address');
      const btn = document.getElementById('drip-btn');
      const result = document.getElementById('result');
      const address = addressInput.value.trim();

      if (!address || !address.match(/^0x[a-fA-F0-9]{40}$/)) {
        result.className = 'result error';
        result.innerHTML = 'Please enter a valid Ethereum address (0x...)';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Sending...';
      result.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/drip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          result.className = 'result success';
          result.innerHTML = `Sent ${data.amount} to ${address}<div class="tx-hash">TX: ${data.txHash}</div>`;
        } else {
          result.className = 'result error';
          result.innerHTML = data.message || 'Request failed';
        }
      } catch (err) {
        result.className = 'result error';
        result.innerHTML = 'Network error. Is the faucet server running?';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Request Test Tokens';
      }
    }

    // Submit on Enter
    document.getElementById('address').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') requestDrip();
    });

    // Load faucet info
    fetch(`${API_BASE}/health`)
      .then(r => r.json())
      .then(data => {
        if (data.balance) {
          document.getElementById('drip-amount').textContent = '1 LITHO';
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
