# Lithosphere CI — Smart Contract Pipeline
# Compile, test, lint, gas report, static analysis (Slither), ABI export

name: CI Contracts

on:
  push:
    branches: [main]
    paths:
      - 'Makulu/contracts/**'
      - 'Makulu/templates/contracts-template/**'
      - '.github/workflows/ci-contracts.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'Makulu/contracts/**'
      - 'Makulu/templates/contracts-template/**'
      - '.github/workflows/ci-contracts.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Compile contracts and cache artifacts for downstream jobs
  # ─────────────────────────────────────────────────────────────────────
  compile:
    name: Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Makulu/contracts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Makulu/contracts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Compile with Hardhat
        run: pnpm compile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: |
            Makulu/contracts/artifacts/
            Makulu/contracts/cache/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Run contract tests (Makulu/contracts + contracts-template)
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Makulu/contracts/pnpm-lock.yaml

      - name: Install — contracts
        working-directory: ./Makulu/contracts
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Test — contracts
        working-directory: ./Makulu/contracts
        run: pnpm test
        env:
          CI: true

      - name: Install — contracts-template
        working-directory: ./Makulu/templates/contracts-template
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Test — contracts-template
        working-directory: ./Makulu/templates/contracts-template
        run: pnpm test
        env:
          CI: true

      - name: Test Summary
        if: always()
        run: |
          echo "## Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "- contracts: completed" >> $GITHUB_STEP_SUMMARY
          echo "- contracts-template: completed" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Solidity linting with solhint
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install — contracts-template
        working-directory: ./Makulu/templates/contracts-template
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Lint Solidity
        working-directory: ./Makulu/templates/contracts-template
        run: pnpm lint
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────
  # Gas report (Hardhat gas reporter)
  # ─────────────────────────────────────────────────────────────────────
  gas-report:
    name: Gas Report
    runs-on: ubuntu-latest
    needs: compile
    defaults:
      run:
        working-directory: ./Makulu/templates/contracts-template
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run tests with gas reporting
        run: pnpm test
        env:
          REPORT_GAS: 'true'
          CI: 'true'

      - name: Upload gas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: Makulu/templates/contracts-template/gas-report.txt
          if-no-files-found: ignore
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Static analysis with Slither
  # ─────────────────────────────────────────────────────────────────────
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ./Makulu/templates/contracts-template
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Compile contracts (required by Slither)
        run: npx hardhat compile

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: slither . --config-file .slither.config.json || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: Makulu/templates/contracts-template/slither-report.sarif
        continue-on-error: true

      - name: Upload Slither JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: |
            Makulu/templates/contracts-template/slither-report.json
            Makulu/templates/contracts-template/slither-report.sarif
          if-no-files-found: ignore
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Export compiled ABIs as build artifacts
  # ─────────────────────────────────────────────────────────────────────
  abi-export:
    name: ABI Export
    runs-on: ubuntu-latest
    needs: compile
    defaults:
      run:
        working-directory: ./Makulu/contracts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Compile
        run: pnpm compile

      - name: Extract ABIs
        run: |
          mkdir -p abi-export
          for f in artifacts/contracts/src/*.sol/*.json; do
            [ -f "$f" ] || continue
            # Skip .dbg.json files
            [[ "$f" == *.dbg.json ]] && continue
            name=$(basename "$f" .json)
            node -e "const a=JSON.parse(require('fs').readFileSync('$f','utf8'));require('fs').writeFileSync('abi-export/${name}.abi.json',JSON.stringify(a.abi,null,2))"
            echo "Exported: ${name}.abi.json"
          done

      - name: Upload ABIs
        uses: actions/upload-artifact@v4
        with:
          name: contract-abis
          path: Makulu/contracts/abi-export/
          retention-days: 90
