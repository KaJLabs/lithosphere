# ============================================================================
# Lithosphere Simple Deployment Pipeline
# Git-based deployment to VPS via Bastion ProxyJump
# ============================================================================

name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'Makulu/**'
      - '.github/workflows/deploy-simple.yaml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging
          - mainnet

env:
  DEPLOY_PATH: /opt/lithosphere/Makulu
  LITHOSCAN_PATH: /opt/lithoscan
  EXPLORER_ENV_PATH: /opt/lithoscan/monitoring/explorer
  # SSH targets — resolved from secrets at workflow level
  INDEXER_IP: ${{ secrets.INDEXER_IP }}
  BASTION_HOST: ${{ secrets.BASTION_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'mainnet' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for OIDC → AWS role assumption (mainnet RDS)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Effective Environment
        id: resolve-env
        run: echo "name=${{ github.event.inputs.environment || 'mainnet' }}" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials (OIDC)
        if: steps.resolve-env.outputs.name == 'mainnet'
        continue-on-error: true
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch RDS Credentials from Secrets Manager
        if: steps.resolve-env.outputs.name == 'mainnet' && steps.aws-creds.outcome == 'success'
        id: rds-creds
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "litho-mainnet-db-credentials" \
            --query SecretString --output text)
          echo "::add-mask::$(echo "$SECRET_JSON" | jq -r '.password')"
          echo "rds_endpoint=$(echo "$SECRET_JSON" | jq -r '.host')" >> $GITHUB_OUTPUT
          echo "rds_username=$(echo "$SECRET_JSON" | jq -r '.username')" >> $GITHUB_OUTPUT
          echo "rds_password=$(echo "$SECRET_JSON" | jq -r '.password')" >> $GITHUB_OUTPUT

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Validate Secrets & Add Bastion to Known Hosts
        run: |
          if [ -z "$INDEXER_IP" ]; then
            echo "❌ INDEXER_IP secret is not set"; exit 1
          fi
          if [ -z "$SERVER_USER" ]; then
            echo "❌ SERVER_USER secret is not set"; exit 1
          fi
          if [ -z "$BASTION_HOST" ]; then
            echo "❌ BASTION_HOST secret is not set"; exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          echo "✅ Secrets validated. Bastion: $BASTION_HOST → Indexer: $INDEXER_IP"

      - name: Bootstrap Server (install Docker if missing)
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            set -e
            # ── Docker Engine ──────────────────────────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "🐳 Installing Docker Engine..."
              sudo dnf install -y docker
              sudo systemctl enable --now docker
              sudo usermod -aG docker "$USER"
              echo "✅ Docker Engine installed"
            else
              echo "✅ Docker Engine present: $(sudo docker --version)"
            fi
            sudo systemctl start docker 2>/dev/null || true

            # ── Docker Compose plugin ──────────────────────────────────────────
            if ! sudo docker compose version &>/dev/null 2>&1; then
              echo "🔧 Installing Docker Compose plugin..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL \
                "https://github.com/docker/compose/releases/download/v2.24.7/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              echo "✅ Docker Compose installed: $(sudo docker compose version)"
            else
              echo "✅ Docker Compose present: $(sudo docker compose version)"
            fi
          ENDSSH

      - name: Deploy to Server
        run: |
          echo "🚀 Deploying Lithosphere to $INDEXER_IP via bastion $BASTION_HOST..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            set -e
            sudo mkdir -p /opt/lithosphere
            sudo chown "$USER:$USER" /opt/lithosphere
            cd /opt/lithosphere

            echo "📦 Pulling latest code from GitHub..."
            if [ ! -d lithosphere ]; then
              git clone https://github.com/KaJLabs/lithosphere.git
            else
              cd lithosphere
              git fetch origin
              git reset --hard origin/main
              cd ..
            fi

            echo "📋 Copying files to deployment directory..."
            mkdir -p Makulu
            cp -r lithosphere/Makulu/. Makulu/
            cp -r lithosphere/.github Makulu/ 2>/dev/null || true

            echo "🔧 Configuring environment..."
            cd Makulu
            ENV="${{ github.event.inputs.environment || 'mainnet' }}"
            if [ -f ".env.${ENV}" ]; then
              cp ".env.${ENV}" .env
              echo "Using .env.${ENV}"
            elif [ ! -f .env ]; then
              cp .env.testnet .env
              echo "Fallback: using .env.testnet"
            fi

            echo "🔴 Stopping only the explorer container on port 3100..."
            # 1. Stop ONLY the explorer-web service from LITHOSCAN (keep API/indexer/redis!)
            #    The Fastify API on port 8080 and its indexer MUST stay running.
            if [ -f /opt/lithoscan/docker-compose.yml ]; then
              sudo docker compose -f /opt/lithoscan/docker-compose.yml stop explorer-web 2>/dev/null || true
              sudo docker compose -f /opt/lithoscan/docker-compose.yml rm -f explorer-web 2>/dev/null || true
            fi
            # 2. Stop the existing Makulu explorer container
            sudo docker compose stop explorer 2>/dev/null || true
            sudo docker compose rm -f explorer 2>/dev/null || true
            # 3. Force-remove any remaining container on port 3100 (nginx routes here)
            for PORT in 3100; do
              CIDS=$(sudo docker ps -aq --filter "publish=${PORT}" 2>/dev/null)
              [ -n "$CIDS" ] && sudo docker rm -f $CIDS 2>/dev/null || true
            done
            # 4. Kill any process still holding port 3100
            sudo ss -Htlnp | grep -w ":3100" | grep -oP 'pid=\K[0-9]+' \
              | sort -u | xargs -r sudo kill -9 2>/dev/null || true

            echo "🐳 Building and starting explorer service only..."
            sudo docker compose up -d --build explorer

            echo "🧹 Cleaning up..."
            cd /opt/lithosphere
            rm -rf lithosphere

            echo "✅ Deployment complete!"
          ENDSSH
          echo "Deployment finished at $(date)"

      - name: Build RDS inject script
        if: steps.resolve-env.outputs.name == 'mainnet' && steps.aws-creds.outcome == 'success'
        shell: python
        env:
          RDS_ENDPOINT: ${{ steps.rds-creds.outputs.rds_endpoint }}
          RDS_USERNAME: ${{ steps.rds-creds.outputs.rds_username }}
          RDS_PASSWORD: ${{ steps.rds-creds.outputs.rds_password }}
        run: |
          import os, re
          from urllib.parse import quote
          user = os.environ.get('RDS_USERNAME', '')
          pw   = quote(os.environ.get('RDS_PASSWORD', ''), safe='')
          host = os.environ.get('RDS_ENDPOINT', '')
          if not (user and pw and host):
              print('::warning::RDS credentials missing — skipping script generation')
          else:
              url = f"postgresql://{user}:{pw}@{host}:5432/lithoscan?sslmode=require"
              script = f"""import re
          url = {repr(url)}
          env = '/opt/lithosphere/Makulu/.env'
          lines = open(env).readlines()
          out, found = [], False
          for l in lines:
              if re.match(r'^DATABASE_URL=', l):
                  out.append('DATABASE_URL=' + url + '\\n'); found = True
              else:
                  out.append(l)
          if not found:
              out.append('DATABASE_URL=' + url + '\\n')
          open(env, 'w').writelines(out)
          print('DATABASE_URL injected OK')
          """
              with open('/tmp/inject_db.py', 'w') as f:
                  f.write(script)
              print(f"Script written — host: {host}")

      - name: Inject RDS DATABASE_URL for Mainnet
        if: steps.resolve-env.outputs.name == 'mainnet' && steps.aws-creds.outcome == 'success'
        run: |
          if [ -f /tmp/inject_db.py ]; then
            echo "🔒 Copying inject script to server..."
            scp -o StrictHostKeyChecking=no \
                -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
                /tmp/inject_db.py \
                "$SERVER_USER@$INDEXER_IP:/tmp/inject_db.py"

            echo "🔒 Running inject and restarting api/indexer..."
            ssh -o StrictHostKeyChecking=no \
                -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
                "$SERVER_USER@$INDEXER_IP" \
                'sudo python3 /tmp/inject_db.py && cd /opt/lithosphere/Makulu && sudo docker compose up -d --force-recreate api indexer && echo "✅ Containers restarted with new DATABASE_URL"'
          else
            echo "::warning::No inject script found — skipping DATABASE_URL injection"
          fi

      # ── Health checks ──────────────────────────────────────────────────────
      - name: Wait for Services
        run: sleep 30

      - name: Health Check — API Service
        run: |
          echo "🏥 Checking API on indexer (localhost:4000/health via SSH)..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            MAX_RETRIES=5; RETRY_DELAY=10
            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
                --connect-timeout 10 --max-time 30 \
                "http://localhost:4000/health" || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ API health check passed!"; cat /tmp/response.txt; break
              fi
              echo "⚠️  Attempt $i: HTTP $HTTP_CODE"
              [ $i -lt $MAX_RETRIES ] && sleep $RETRY_DELAY
            done
            [ "$HTTP_CODE" != "200" ] && { echo "❌ API health check failed"; exit 1; } || true
          ENDSSH

      - name: Health Check — Explorer Frontend (:3100)
        run: |
          echo "🌐 Checking Explorer on indexer (localhost:3100 via SSH)..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            MAX_RETRIES=8; RETRY_DELAY=20
            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 10 --max-time 30 \
                "http://localhost:3100" || echo "000")
              echo "  Attempt $i: HTTP $HTTP_CODE"
              case "$HTTP_CODE" in 2*|3*) echo "✅ Explorer responding (HTTP $HTTP_CODE)"; break ;; esac
              [ $i -lt $MAX_RETRIES ] && sleep $RETRY_DELAY
            done
            case "$HTTP_CODE" in
              2*|3*) true ;;
              *)
                echo "❌ Explorer health check failed — diagnostics:"
                echo "── All containers:"
                sudo docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
                echo "── Explorer logs (last 80 lines):"
                sudo docker logs litho-explorer --tail 80 2>&1 || \
                  echo "(litho-explorer container not found)"
                exit 1
              ;;
            esac
          ENDSSH

      - name: Test API Endpoints
        run: |
          echo "🧪 Testing API endpoints on indexer via SSH..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            curl -f "http://localhost:4000/health"
            curl -f "http://localhost:4000/api/litho"
            curl -f -X POST -H "Content-Type: application/json" \
              -d '{"query":"{ __typename }"}' \
              "http://localhost:4000/graphql"
            echo "✅ All endpoint tests passed!"
          ENDSSH

      - name: Generate Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'mainnet' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Indexer EC2 | $INDEXER_IP |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed At | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Service URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Explorer: https://makalu.litho.ai" >> $GITHUB_STEP_SUMMARY
          echo "- API: http://$INDEXER_IP:4000" >> $GITHUB_STEP_SUMMARY
          echo "- GraphQL: http://$INDEXER_IP:4000/graphql" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://$INDEXER_IP:4000/health" >> $GITHUB_STEP_SUMMARY

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    env:
      INDEXER_IP: ${{ secrets.INDEXER_IP }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Add Bastion to Known Hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rollback
        run: |
          echo "⚠️ Deployment failed — rolling back..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            cd /opt/lithosphere/Makulu
            docker compose down --timeout 30
            docker compose up -d --remove-orphans
            echo "Rollback initiated"
          ENDSSH
          echo "::warning::Deployment was rolled back due to health check failure"
