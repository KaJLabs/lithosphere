# ============================================================================
# Lithosphere Simple Deployment Pipeline
# Git-based deployment to VPS via Bastion ProxyJump
# ============================================================================

name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'Makulu/**'
      - '.github/workflows/deploy-simple.yaml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging
          - mainnet

env:
  DEPLOY_PATH: /opt/lithosphere/Makulu
  LITHOSCAN_PATH: /opt/lithoscan
  EXPLORER_ENV_PATH: /opt/lithoscan/monitoring/explorer
  # SSH targets — resolved from secrets at workflow level
  INDEXER_IP: ${{ secrets.INDEXER_IP }}
  BASTION_HOST: ${{ secrets.BASTION_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'testnet' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for OIDC → AWS role assumption (mainnet RDS)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        if: github.event.inputs.environment == 'mainnet'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch RDS Credentials from Secrets Manager
        if: github.event.inputs.environment == 'mainnet'
        id: rds-creds
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "litho-mainnet-db-credentials" \
            --query SecretString --output text)
          echo "::add-mask::$(echo "$SECRET_JSON" | jq -r '.password')"
          echo "rds_endpoint=$(echo "$SECRET_JSON" | jq -r '.host')" >> $GITHUB_OUTPUT
          echo "rds_username=$(echo "$SECRET_JSON" | jq -r '.username')" >> $GITHUB_OUTPUT
          echo "rds_password=$(echo "$SECRET_JSON" | jq -r '.password')" >> $GITHUB_OUTPUT

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Validate Secrets & Add Bastion to Known Hosts
        run: |
          if [ -z "$INDEXER_IP" ]; then
            echo "❌ INDEXER_IP secret is not set"; exit 1
          fi
          if [ -z "$SERVER_USER" ]; then
            echo "❌ SERVER_USER secret is not set"; exit 1
          fi
          if [ -z "$BASTION_HOST" ]; then
            echo "❌ BASTION_HOST secret is not set"; exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          echo "✅ Secrets validated. Bastion: $BASTION_HOST → Indexer: $INDEXER_IP"

      - name: Deploy to Server
        run: |
          echo "🚀 Deploying Lithosphere to $INDEXER_IP via bastion $BASTION_HOST..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            set -e
            cd /opt/lithosphere

            echo "📦 Pulling latest code from GitHub..."
            if [ ! -d lithosphere ]; then
              git clone https://github.com/KaJLabs/lithosphere.git
            else
              cd lithosphere
              git fetch origin
              git reset --hard origin/main
              cd ..
            fi

            echo "📋 Copying files to deployment directory..."
            mkdir -p Makulu
            cp -r lithosphere/Makulu/* Makulu/
            cp -r lithosphere/.github Makulu/ 2>/dev/null || true

            echo "🔧 Configuring environment..."
            cd Makulu
            ENV="${{ github.event.inputs.environment || 'testnet' }}"
            if [ -f ".env.${ENV}" ]; then
              cp ".env.${ENV}" .env
              echo "Using .env.${ENV}"
            elif [ ! -f .env ]; then
              cp .env.testnet .env
              echo "Fallback: using .env.testnet"
            fi

            echo "🐳 Building Docker images..."
            docker compose build api indexer

            echo "🛑 Removing leftover explorer container (handled by Lithoscan stack)..."
            docker rm -f litho-explorer 2>/dev/null || true

            echo "🔄 Restarting services..."
            docker compose up -d --remove-orphans

            echo "🧹 Cleaning up..."
            cd /opt/lithosphere
            rm -rf lithosphere

            echo "✅ Deployment complete!"
          ENDSSH
          echo "Deployment finished at $(date)"

      - name: Inject RDS DATABASE_URL for Mainnet
        if: github.event.inputs.environment == 'mainnet'
        env:
          RDS_ENDPOINT: ${{ steps.rds-creds.outputs.rds_endpoint }}
          RDS_USERNAME: ${{ steps.rds-creds.outputs.rds_username }}
          RDS_PASSWORD: ${{ steps.rds-creds.outputs.rds_password }}
        run: |
          if [ -n "$RDS_ENDPOINT" ] && [ -n "$RDS_PASSWORD" ]; then
            echo "🔒 Injecting RDS DATABASE_URL into .env on remote..."
            ssh -o StrictHostKeyChecking=no \
                -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
                "$SERVER_USER@$INDEXER_IP" \
                "sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://${RDS_USERNAME}:${RDS_PASSWORD}@${RDS_ENDPOINT}:5432/lithoscan|' /opt/lithosphere/Makulu/.env && echo 'DATABASE_URL injected.'"
          else
            echo "::warning::RDS credentials not available — skipping DATABASE_URL injection"
          fi

      # ── Lithoscan Explorer deploy ──────────────────────────────────────────
      - name: Write Explorer Production .env
        run: |
          echo "📝 Writing explorer .env on $INDEXER_IP..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENVSSH'
            set -e
            sudo mkdir -p /opt/lithoscan/monitoring/explorer
            {
              echo '# Lithosphere Explorer — Production Environment'
              echo '# Auto-generated by GitHub Actions deploy-simple.yaml'
              echo 'CHAIN_ID=lithosphere_777777-1'
              echo 'CHAIN_NAME=Lithosphere'
              echo ''
              echo '# Endpoints — Public domains (TLS via Nginx on Sentry 1)'
              echo 'RPC_URL=https://rpc.litho.ai'
              echo 'EVM_RPC_URL=http://litho-mainnet-rpc-nlb-90cbce98dabd2453.elb.us-east-1.amazonaws.com:8545'
              echo 'GRPC_URL=54.163.248.63:9090'
              echo 'RPC_ENDPOINTS=https://rpc.litho.ai,http://52.41.98.79:26657'
              echo 'GRPC_ENDPOINTS=54.163.248.63:9090,52.41.98.79:9090'
              echo ''
              echo '# Indexer'
              echo 'START_BLOCK=1'
              echo 'BATCH_SIZE=100'
              echo 'LOG_LEVEL=info'
              echo ''
              echo '# API'
              echo 'NODE_ENV=production'
              echo 'CORS_ORIGINS=https://makalu.litho.ai,https://status.litho.ai'
              echo ''
              echo '# Frontend'
              echo 'NEXT_PUBLIC_SITE_URL=https://makalu.litho.ai'
              echo 'NEXT_PUBLIC_API_URL=https://makalu.litho.ai/api'
              echo 'NEXT_PUBLIC_RPC_URL=https://rpc.litho.ai'
              echo 'NEXT_PUBLIC_CHAIN_ID=lithosphere_777777-1'
              echo 'NEXT_PUBLIC_CHAIN_NAME=Lithosphere'
              echo ''
              echo '# Network status'
              echo 'CHECK_INTERVAL=5000'
              echo ''
              echo '# Database (passwords injected via GitHub Secrets on the host)'
              echo 'POSTGRES_DB=lithoscan'
              echo 'POSTGRES_USER=litho'
            } | sudo tee /opt/lithoscan/monitoring/explorer/.env > /dev/null
            sudo chmod 640 /opt/lithoscan/monitoring/explorer/.env
            echo "✅ .env written:"
            cat /opt/lithoscan/monitoring/explorer/.env
          ENVSSH

      - name: Deploy Explorer Stack via docker compose
        run: |
          echo "🐳 Deploying Explorer & Indexer stack at /opt/lithoscan..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            set -e
            cd /opt/lithoscan

            COMPOSE_FILE=$(find . -maxdepth 2 \
              \( -name 'docker-compose.yml' -o -name 'docker-compose.yaml' \
                 -o -name 'compose.yml'      -o -name 'compose.yaml' \) \
              -print -quit)

            if [ -z "$COMPOSE_FILE" ]; then
              echo "❌ No docker-compose file found under /opt/lithoscan"
              ls -la /opt/lithoscan
              exit 1
            fi

            echo "Using compose file: $COMPOSE_FILE"

            docker compose -f "$COMPOSE_FILE" \
              --env-file /opt/lithoscan/monitoring/explorer/.env \
              pull --ignore-pull-failures 2>/dev/null || true

            docker compose -f "$COMPOSE_FILE" \
              --env-file /opt/lithoscan/monitoring/explorer/.env \
              up -d --build --remove-orphans

            echo "✅ Explorer stack launched."
          ENDSSH

      # ── Health checks ──────────────────────────────────────────────────────
      - name: Wait for Services
        run: sleep 30

      - name: Health Check — API Service
        run: |
          echo "🏥 Checking API at http://$INDEXER_IP:4000/health ..."
          MAX_RETRIES=5; RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "http://$INDEXER_IP:4000/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API health check passed!"; cat /tmp/response.txt; break
            fi
            echo "⚠️  Attempt $i: HTTP $HTTP_CODE"
            [ $i -lt $MAX_RETRIES ] && sleep $RETRY_DELAY
          done
          [ "$HTTP_CODE" != "200" ] && { echo "::error::❌ API health check failed"; exit 1; } || true

      - name: Health Check — Explorer Frontend (:3000)
        run: |
          echo "🌐 Checking Explorer at http://$INDEXER_IP:3000 ..."
          MAX_RETRIES=6; RETRY_DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "http://$INDEXER_IP:3000" || echo "000")
            echo "  Attempt $i: HTTP $HTTP_CODE"
            [[ "$HTTP_CODE" =~ ^[23] ]] && { echo "✅ Explorer responding (HTTP $HTTP_CODE)"; break; }
            [ $i -lt $MAX_RETRIES ] && sleep $RETRY_DELAY
          done
          [[ "$HTTP_CODE" =~ ^[23] ]] || { echo "::error::❌ Explorer health check failed"; exit 1; }

      - name: Test API Endpoints
        run: |
          echo "🧪 Testing API endpoints..."
          curl -f "http://$INDEXER_IP:4000/health"
          curl -f "http://$INDEXER_IP:4000/api/litho"
          curl -f -X POST -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "http://$INDEXER_IP:4000/graphql"
          echo "✅ All endpoint tests passed!"

      - name: Generate Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'testnet' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Indexer EC2 | $INDEXER_IP |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed At | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Service URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Explorer: https://makalu.litho.ai" >> $GITHUB_STEP_SUMMARY
          echo "- API: http://$INDEXER_IP:4000" >> $GITHUB_STEP_SUMMARY
          echo "- GraphQL: http://$INDEXER_IP:4000/graphql" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://$INDEXER_IP:4000/health" >> $GITHUB_STEP_SUMMARY

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    env:
      INDEXER_IP: ${{ secrets.INDEXER_IP }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Add Bastion to Known Hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rollback
        run: |
          echo "⚠️ Deployment failed — rolling back..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            cd /opt/lithosphere/Makulu
            docker compose down --timeout 30
            docker compose up -d --remove-orphans
            echo "Rollback initiated"
          ENDSSH
          echo "::warning::Deployment was rolled back due to health check failure"
