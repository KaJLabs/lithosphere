# ============================================================================
# Lithosphere Deployment Pipeline - Phase 4 (DEPRECATED)
# Replaced by deploy-simple.yaml which uses AWS SSM instead of SSH/bastion.
# Automatic triggers removed — manual dispatch only for emergency use.
# ============================================================================

name: Deploy (legacy SSH)

on:
  # Manual deployment trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging
          - mainnet
      skip_signature_check:
        description: 'Skip signature verification (emergency only)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kajlabs/lithosphere/service-template
  DEPLOY_PATH: /opt/lithosphere/Makulu
  INDEXER_IP: ${{ secrets.INDEXER_IP }}
  BASTION_HOST: ${{ secrets.BASTION_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'testnet' }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Verify SLSA Signatures
  # Ensures only cryptographically signed images are deployed
  # ─────────────────────────────────────────────────────────────────────────
  verify-signatures:
    name: Verify SLSA Signatures
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      verified: ${{ steps.verify.outputs.verified }}

    defaults:
      run:
        working-directory: ./Makulu

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Cosign Signatures
        id: verify
        if: ${{ github.event.inputs.skip_signature_check != 'true' }}
        run: |
          set +e
          
          # List of images to verify
          IMAGES=(
            "kajlabs/lithosphere-api"
            "kajlabs/lithosphere-indexer"
          )
          
          VERIFICATION_FAILED=false
          
          for IMAGE in "${IMAGES[@]}"; do
            echo ""
            echo "🔍 Verifying signature for: ${{ env.REGISTRY }}/${IMAGE}:latest"
            
            # Check if image exists
            if ! docker manifest inspect ${{ env.REGISTRY }}/${IMAGE}:latest >/dev/null 2>&1; then
              echo "⚠️  Warning: Image ${IMAGE}:latest not found in registry (will build locally)"
              continue
            fi
            
            # Verify the image signature using keyless signing (Fulcio + Rekor)
            cosign verify \
              --certificate-identity-regexp="https://github.com/KaJLabs/lithosphere/.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.REGISTRY }}/${IMAGE}:latest
            
            RESULT=$?
            
            if [ $RESULT -eq 0 ]; then
              echo "✅ Signature verification successful for ${IMAGE}"
            else
              echo "⚠️  Warning: Signature verification failed for ${IMAGE}"
              echo "   (Images built locally on VPS may not have signatures)"
            fi
          done
          
          echo "verified=true" >> $GITHUB_OUTPUT

      - name: Skip Signature Check (Emergency)
        if: ${{ github.event.inputs.skip_signature_check == 'true' }}
        run: |
          echo "::warning::⚠️ Signature verification skipped - Emergency deployment mode"
          echo "verified=skipped" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to Target Environment
  # Push-based deployment via SSH
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'testnet' }}
    runs-on: ubuntu-latest
    needs: verify-signatures
    if: |
      needs.verify-signatures.outputs.verified == 'true' || 
      needs.verify-signatures.outputs.verified == 'skipped'
    
    environment:
      name: ${{ github.event.inputs.environment || 'testnet' }}
      url: ${{ steps.deploy.outputs.service_url }}

    permissions:
      contents: read
      packages: write
      id-token: write   # Required for OIDC → AWS role assumption

    defaults:
      run:
        working-directory: ./Makulu

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        if: github.event.inputs.environment == 'mainnet'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch RDS Credentials from Secrets Manager
        if: github.event.inputs.environment == 'mainnet'
        id: rds-creds
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "litho-mainnet-db-credentials" \
            --query SecretString --output text)
          echo "::add-mask::$(echo "$SECRET_JSON" | jq -r '.password')"
          echo "rds_endpoint=$(echo "$SECRET_JSON" | jq -r '.host')" >> $GITHUB_OUTPUT
          echo "rds_username=$(echo "$SECRET_JSON" | jq -r '.username')" >> $GITHUB_OUTPUT
          echo "rds_password=$(echo "$SECRET_JSON" | jq -r '.password')" >> $GITHUB_OUTPUT

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Validate Required Secrets & Add Bastion to Known Hosts
        run: |
          MISSING=false
          [ -z "$INDEXER_IP" ]   && echo "❌ INDEXER_IP not set"   && MISSING=true
          [ -z "$BASTION_HOST" ] && echo "❌ BASTION_HOST not set" && MISSING=true
          [ -z "$SERVER_USER" ]  && echo "❌ SERVER_USER not set"  && MISSING=true
          [ "$MISSING" = true ] && exit 1
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          echo "✅ Secrets validated. Bastion: $BASTION_HOST → Indexer: $INDEXER_IP"

      - name: Prepare Deployment Package
        id: prepare
        run: |
          # Create deployment directory
          mkdir -p deploy-package
          
          # Copy deployment files
          cp docker-compose.yaml deploy-package/
          cp .env.testnet deploy-package/.env 2>/dev/null || echo "No .env.testnet found, will use secrets"
          
          # Generate .env file from secrets if not present
          if [ ! -f deploy-package/.env ]; then
            cat > deploy-package/.env << 'ENVEOF'
          # Lithosphere Testnet Environment Configuration
          # Auto-generated by GitHub Actions deployment
          
          NODE_ENV=production
          ENVIRONMENT=${{ github.event.inputs.environment || 'testnet' }}
          
          # API Configuration
          API_PORT=4000
          API_HOST=0.0.0.0
          
          # GraphQL Configuration
          GRAPHQL_PLAYGROUND=${{ github.event.inputs.environment == 'testnet' && 'true' || 'false' }}
          
          # Database Configuration
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          
          # Blockchain RPC Configuration
          LITHO_RPC_URL=${{ secrets.LITHO_RPC_URL }}
          LITHO_CHAIN_ID=${{ secrets.LITHO_CHAIN_ID }}
          
          # Indexer Configuration
          INDEXER_START_BLOCK=${{ secrets.INDEXER_START_BLOCK || '1' }}
          START_BLOCK=${{ secrets.INDEXER_START_BLOCK || '1' }}
          RPC_URL=${{ secrets.LITHO_RPC_URL }}
          EVM_RPC_URL=${{ secrets.EVM_RPC_URL }}
          INDEXER_BATCH_SIZE=100
          
          # Monitoring
          PROMETHEUS_ENABLED=true
          METRICS_PORT=9090
          
          # Container Registry
          IMAGE_TAG=${{ github.event.inputs.environment || 'testnet' }}
          ENVEOF
          fi
          
          # Create deployment script
          cat > deploy-package/deploy.sh << 'DEPLOYEOF'
          #!/bin/bash
          set -euo pipefail
          
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/lithosphere/Makulu}"
          
          echo "🚀 Starting Lithosphere deployment..."
          
          cd "$DEPLOY_PATH"
          
          # Pull latest images
          echo "📦 Pulling latest images..."
          docker compose pull
          
          # Stop existing containers gracefully
          echo "🛑 Stopping existing services..."
          docker compose down --timeout 30 || true
          
          # Start services
          echo "🔄 Starting services..."
          docker compose up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to become healthy..."
          sleep 10
          
          # Check service status
          docker compose ps
          
          echo "✅ Deployment complete!"
          DEPLOYEOF
          
          chmod +x deploy-package/deploy.sh
          
          echo "package_ready=true" >> $GITHUB_OUTPUT

      - name: Tag Image for Environment
        id: tag-image
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'testnet' }}
        run: |
          echo "📦 Tagging images for ${ENVIRONMENT} environment..."
          
          # Log in to registry
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          
          # Timestamp for version tracking
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          # List of actual service images being used
          IMAGES=(
            "kajlabs/lithosphere-api"
            "kajlabs/lithosphere-indexer"
          )
          
          for IMAGE in "${IMAGES[@]}"; do
            echo ""
            echo "🏷️  Tagging ${IMAGE}..."
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${IMAGE}:latest || {
              echo "⚠️  Warning: Could not pull ${IMAGE}:latest (may not exist yet)"
              continue
            }
            
            # Tag with environment-specific tag
            docker tag \
              ${{ env.REGISTRY }}/${IMAGE}:latest \
              ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}
            
            # Tag with timestamp for version tracking
            docker tag \
              ${{ env.REGISTRY }}/${IMAGE}:latest \
              ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}-${TIMESTAMP}
            
            # Push environment-specific tags
            docker push ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}
            docker push ${{ env.REGISTRY }}/${IMAGE}:${ENVIRONMENT}-${TIMESTAMP}
            
            echo "✅ Tagged ${IMAGE} as:"
            echo "  - ${ENVIRONMENT}"
            echo "  - ${ENVIRONMENT}-${TIMESTAMP}"
          done
          
          echo ""
          echo "image_tag=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "image_tag_timestamp=${ENVIRONMENT}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        id: deploy
        run: |
          echo "🚀 Deploying to $INDEXER_IP via bastion $BASTION_HOST..."
          ENV="${{ github.event.inputs.environment || 'mainnet' }}"

          # Transfer deployment package via SCP through bastion
          scp -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              -r deploy-package/* "$SERVER_USER@$INDEXER_IP:$DEPLOY_PATH/"

          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << ENDSSH
            set -e
            sudo mkdir -p /opt/lithosphere
            sudo chown "\$USER:\$USER" /opt/lithosphere
            cd /opt/lithosphere

            if [ ! -d lithosphere ]; then
              git clone https://github.com/KaJLabs/lithosphere.git
            else
              cd lithosphere && git fetch origin && git reset --hard origin/main && cd ..
            fi

            mkdir -p Makulu
            cp -r lithosphere/Makulu/. Makulu/
            rm -rf lithosphere

            cd Makulu
            if [ -f ".env.${ENV}" ]; then
              cp ".env.${ENV}" .env
              echo "Using .env.${ENV}"
            elif [ ! -f .env ]; then
              cp .env.mainnet .env
              echo "Fallback: using .env.mainnet"
            fi

            RDS_URL="${{ steps.rds-creds.outputs.rds_endpoint }}"
            RDS_USER="${{ steps.rds-creds.outputs.rds_username }}"
            RDS_PASS="${{ steps.rds-creds.outputs.rds_password }}"
            if [ "${ENV}" = "mainnet" ] && [ -n "\$RDS_URL" ] && [ -n "\$RDS_PASS" ]; then
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=postgresql://\${RDS_USER}:\${RDS_PASS}@\${RDS_URL}:5432/lithoscan|" .env
              echo "DATABASE_URL injected from RDS."
            fi

            sudo docker compose up -d --build --remove-orphans
          ENDSSH

          echo "service_url=https://makalu.litho.ai" >> $GITHUB_OUTPUT
          echo "✅ Deployed to indexer via bastion"

      - name: Cleanup Old Docker Images
        run: |
          echo "🧹 Cleaning up old Docker images on indexer..."

          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'CLEANUP_SCRIPT'
          set -euo pipefail
          
          echo "📊 Disk usage BEFORE cleanup:"
          df -h /var/lib/docker 2>/dev/null || df -h /
          echo ""
          
          # Remove dangling images (untagged)
          echo "Removing dangling images..."
          DANGLING=$(docker image prune -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${DANGLING}"
          
          # Remove images older than 7 days (keep recent for rollback)
          echo "Removing images older than 7 days..."
          OLD_IMAGES=$(docker image prune -a --filter "until=168h" -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${OLD_IMAGES}"
          
          # Remove unused volumes
          echo "Removing unused volumes..."
          VOLUMES=$(docker volume prune -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${VOLUMES}"
          
          # Remove build cache (keep last 24 hours)
          echo "Pruning build cache..."
          BUILD_CACHE=$(docker builder prune -a --filter "until=24h" -f 2>&1 | grep -oP 'Total reclaimed space: \K.*' || echo "0B")
          echo "  Reclaimed: ${BUILD_CACHE}"
          
          echo ""
          echo "📊 Disk usage AFTER cleanup:"
          df -h /var/lib/docker 2>/dev/null || df -h /
          
          echo ""
          echo "🐳 Current Docker images:"
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | head -10 || true
          
          echo ""
          echo "✅ Cleanup complete!"
          CLEANUP_SCRIPT
          
          echo "cleanup_status=success" >> $GITHUB_OUTPUT

      - name: Generate Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'testnet' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Images | API, Indexer |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ steps.tag-image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Image | \`${{ env.REGISTRY }}/kajlabs/lithosphere-api:${{ steps.tag-image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Indexer Image | \`${{ env.REGISTRY }}/kajlabs/lithosphere-indexer:${{ steps.tag-image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed At | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Health Check Verification
  # Verify all services are running correctly post-deployment
  # ─────────────────────────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    env:
      INDEXER_IP: ${{ secrets.INDEXER_IP }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Add Bastion to Known Hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for Services to Stabilize
        run: sleep 30

      - name: Health Check - API Service
        id: api-health
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            MAX_RETRIES=5; RETRY_DELAY=10
            for i in $(seq 1 $MAX_RETRIES); do
              echo "Attempt $i: checking API..."
              HTTP_CODE=$(curl -s -o /tmp/r.txt -w "%{http_code}" --connect-timeout 10 --max-time 30 \
                http://localhost:4000/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ API healthy!"; cat /tmp/r.txt; break
              fi
              echo "⚠️ HTTP $HTTP_CODE"
              [ $i -lt $MAX_RETRIES ] && sleep $RETRY_DELAY
            done
            [ "$HTTP_CODE" != "200" ] && { echo "❌ API health check failed"; exit 1; } || true
          ENDSSH

      - name: Health Check - GraphQL Endpoint
        id: graphql-health
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" \
              "curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' \
               -d '{\"query\":\"{ __typename }\"}' http://localhost:4000/graphql" | grep -qE '^2' \
            && echo "✅ GraphQL healthy" || echo "::warning::⚠️ GraphQL degraded"

      - name: Health Check - Metrics Endpoint
        id: metrics-health
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:9090/metrics" | grep -qE '^2' \
            && echo "✅ Metrics healthy" || echo "::warning::⚠️ Metrics unavailable"

      - name: Generate Health Report
        if: always()
        run: |
          echo "## 🏥 Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API (/health) | ${{ steps.api-health.outputs.api_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GraphQL (/graphql) | ${{ steps.graphql-health.outputs.graphql_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics (/metrics) | ${{ steps.metrics-health.outputs.metrics_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Rollback on Failure
  # Automatically rollback if health checks fail
  # ─────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: failure() && needs.deploy.result == 'success'

    env:
      INDEXER_IP: ${{ secrets.INDEXER_IP }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    defaults:
      run:
        working-directory: ./Makulu

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BASTION_SSH_KEY }}
            ${{ secrets.INDEXER_SSH_KEY }}

      - name: Add Bastion to Known Hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -T 10 -H "$BASTION_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rollback Deployment
        run: |
          echo "🔄 Initiating rollback..."
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump="$SERVER_USER@$BASTION_HOST" \
              "$SERVER_USER@$INDEXER_IP" << 'ENDSSH'
            cd /opt/lithosphere/Makulu
            if [ -f docker-compose.yaml.bak ]; then
              echo "Restoring previous configuration..."
              mv docker-compose.yaml.bak docker-compose.yaml
              sudo docker compose up -d --remove-orphans
              echo "✅ Rollback complete"
            else
              echo "::warning::No backup found, stopping services"
              sudo docker compose down
            fi
          ENDSSH

      - name: Notify Rollback
        run: |
          echo "## ⚠️ Deployment Rolled Back" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment was rolled back due to failed health checks." >> $GITHUB_STEP_SUMMARY
          echo "Please investigate the logs and retry deployment." >> $GITHUB_STEP_SUMMARY
