# Lithosphere Release Pipeline - SLSA Level 3
# Supply Chain Security with Cosign signing, SBOM generation, and provenance

name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'Makulu/**'
      - '.github/workflows/release.yaml'
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger for testing

env:
  REGISTRY: ghcr.io
  # Note: github.repository is converted to lowercase for Docker compatibility
  IMAGE_NAME: kajlabs/lithosphere/service-template

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'Makulu/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd Makulu && pnpm install

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd Makulu && npx semantic-release

  build-and-push:
    name: Build & Push Container
    needs: semantic-release
    if: always() && (needs.semantic-release.result == 'success' || needs.semantic-release.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    defaults:
      run:
        working-directory: ./Makulu

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and Push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./Makulu/templates/service-template
          file: ./Makulu/templates/service-template/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ─────────────────────────────────────────────────────────────────────────
  # SLSA Provenance Generation - SLSA Level 3 Compliance
  # Generates cryptographically signed build provenance attestation
  # ─────────────────────────────────────────────────────────────────────────
  provenance:
    name: Generate SLSA Provenance
    needs: build-and-push
    permissions:
      actions: read
      id-token: write
      contents: write
      packages: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate SLSA Provenance
        id: provenance
        run: |
          # Extract digest hash (remove sha256: prefix if present)
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          DIGEST_HASH="${DIGEST#sha256:}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COMMIT_TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          
          # Create SLSA v1.0 provenance predicate (only the predicate, not the full statement)
          cat > provenance.json << 'JSONEOF'
          {
            "buildType": "https://slsa.dev/provenance/v1.0?draft",
            "builder": {
              "id": "https://github.com/KaJLabs/lithosphere/Attestations/GitHubActionsWorkflow@v1"
            },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/KaJLabs/lithosphere",
                "digest": {
                  "sha1": "GITHUB_SHA_PLACEHOLDER"
                },
                "entryPoint": ".github/workflows/release.yaml"
              }
            },
            "metadata": {
              "buildInvocationId": "BUILD_ID_PLACEHOLDER",
              "buildStartedOn": "BUILD_START_PLACEHOLDER",
              "buildFinishedOn": "BUILD_END_PLACEHOLDER",
              "completeness": {
                "parameters": true,
                "environment": false,
                "materials": true
              },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+https://github.com/KaJLabs/lithosphere",
                "digest": {
                  "sha1": "GITHUB_SHA_PLACEHOLDER"
                }
              }
            ]
          }
          JSONEOF
          
          # Replace placeholders
          sed -i "s|GITHUB_SHA_PLACEHOLDER|${{ github.sha }}|g" provenance.json
          sed -i "s|BUILD_ID_PLACEHOLDER|${{ github.run_id }}-${{ github.run_attempt }}|g" provenance.json
          sed -i "s|BUILD_START_PLACEHOLDER|${COMMIT_TIMESTAMP}|g" provenance.json
          sed -i "s|BUILD_END_PLACEHOLDER|${TIMESTAMP}|g" provenance.json
          
          echo "Generated SLSA provenance predicate:"
          cat provenance.json
          
          # Validate JSON
          if ! jq empty provenance.json 2>/dev/null; then
            echo "❌ Invalid JSON generated"
            exit 1
          fi
          
          echo "✅ Valid JSON provenance generated"
      
      - name: Attest Provenance with Cosign
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }}"
          
          # Sign the provenance attestation
          cosign attest --yes \
            --predicate provenance.json \
            --type https://slsa.dev/provenance/v1.0?draft \
            "$IMAGE"
          
          echo "✅ SLSA provenance attestation signed and pushed to registry"
      
      - name: Upload Provenance
        uses: actions/upload-artifact@v4
        with:
          name: slsa-provenance
          path: provenance.json

  publish-npm:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    needs: [semantic-release, build-and-push]
    if: always() && needs.semantic-release.outputs.new_release_published == 'true'
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./Makulu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'Makulu/pnpm-lock.yaml'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Sync version from release
        if: needs.semantic-release.outputs.new_release_version != ''
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          echo "Syncing version ${VERSION} to publishable packages"
          # Update SDK
          cd templates/sdk-template && node -e "
            const pkg=JSON.parse(require('fs').readFileSync('package.json','utf8'));
            pkg.version='${VERSION}';
            require('fs').writeFileSync('package.json',JSON.stringify(pkg,null,2)+'\n');
          " && cd ../..
          # Update CLI
          cd packages/create-litho-app && node -e "
            const pkg=JSON.parse(require('fs').readFileSync('package.json','utf8'));
            pkg.version='${VERSION}';
            require('fs').writeFileSync('package.json',JSON.stringify(pkg,null,2)+'\n');
          " && cd ../..

      - name: Build
        run: pnpm build

      - name: Publish @lithosphere/sdk
        run: cd templates/sdk-template && pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish create-litho-app
        run: cd packages/create-litho-app && pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish Summary
        if: always()
        run: |
          echo "## NPM Publish" >> $GITHUB_STEP_SUMMARY
          echo "- @lithosphere/sdk" >> $GITHUB_STEP_SUMMARY
          echo "- create-litho-app" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.semantic-release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Contract Artifact Release — versioned ABI/bytecode bundles with checksums
  # ─────────────────────────────────────────────────────────────────────────
  publish-contract-artifacts:
    name: Publish Contract Artifacts
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./Makulu/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Compile contracts
        run: pnpm compile

      - name: Bundle versioned artifacts
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          BUNDLE_DIR="lithosphere-contracts-v${VERSION}"
          mkdir -p "${BUNDLE_DIR}/abi" "${BUNDLE_DIR}/bytecode" "${BUNDLE_DIR}/metadata"

          for f in artifacts/contracts/src/*.sol/*.json; do
            [ -f "$f" ] || continue
            [[ "$f" == *.dbg.json ]] && continue
            NAME=$(basename "$f" .json)

            # Extract ABI
            node -e "const a=JSON.parse(require('fs').readFileSync('$f','utf8'));require('fs').writeFileSync('${BUNDLE_DIR}/abi/${NAME}.abi.json',JSON.stringify(a.abi,null,2))"

            # Extract bytecode
            node -e "const a=JSON.parse(require('fs').readFileSync('$f','utf8'));require('fs').writeFileSync('${BUNDLE_DIR}/bytecode/${NAME}.bin',a.bytecode||'')"

            # Copy full artifact as metadata
            cp "$f" "${BUNDLE_DIR}/metadata/${NAME}.json"

            echo "Bundled: ${NAME}"
          done

          # Add version manifest
          cat > "${BUNDLE_DIR}/manifest.json" << MANIFEST_EOF
          {
            "version": "${VERSION}",
            "chain": "lithosphere_777777-1",
            "compiler": "solc",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}"
          }
          MANIFEST_EOF

          # Create tarball
          tar -czf "${BUNDLE_DIR}.tar.gz" "${BUNDLE_DIR}/"

          # Generate SHA256 checksums
          sha256sum "${BUNDLE_DIR}.tar.gz" > "${BUNDLE_DIR}.sha256"
          cd "${BUNDLE_DIR}" && sha256sum abi/*.json bytecode/*.bin > ../checksums.txt && cd ..

          echo "BUNDLE_NAME=${BUNDLE_DIR}" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.semantic-release.outputs.new_release_version }}
          files: |
            Makulu/contracts/${{ env.BUNDLE_NAME }}.tar.gz
            Makulu/contracts/${{ env.BUNDLE_NAME }}.sha256
            Makulu/contracts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts-v${{ needs.semantic-release.outputs.new_release_version }}
          path: |
            Makulu/contracts/${{ env.BUNDLE_NAME }}.tar.gz
            Makulu/contracts/${{ env.BUNDLE_NAME }}.sha256
          retention-days: 90
